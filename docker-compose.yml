
services:
  db:
    image: postgres:15
    container_name: buguard_postgres
    restart: always
    environment:
      POSTGRES_USER: buguard_user
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: buguard_assets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: